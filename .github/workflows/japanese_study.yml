name: 일본어 학습 예문 발송

on:
  schedule:
    # 월~금 오전 8시 KST = 일~목 23:00 UTC
    - cron: '0 23 * * 0,1,2,3,4'
  workflow_dispatch:   # 수동 실행 (테스트용)

jobs:
  send-japanese:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 일본어 폰트 다운로드
        run: |
          # TTC(다국어 묶음) 대신 일본어 전용 OTF 직접 다운로드
          wget -q -O /tmp/NotoSansJP.otf \
            "https://github.com/googlefonts/noto-cjk/raw/main/Sans/OTF/Japanese/NotoSansCJKjp-Regular.otf"
          echo "JAPANESE_FONT_PATH=/tmp/NotoSansJP.otf" >> $GITHUB_ENV
          echo "Font downloaded: $(ls -lh /tmp/NotoSansJP.otf)"

      - name: 의존 라이브러리 설치
        run: pip install requests beautifulsoup4 fpdf2 python-dotenv lxml

      - name: 스크립트 실행
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python get_japanese.py
