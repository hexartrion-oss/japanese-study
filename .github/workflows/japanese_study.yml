name: 일본어 학습 예문 발송

on:
  schedule:
    # 월~금 오전 8시 KST = 일~목 23:00 UTC
    - cron: '0 23 * * 0,1,2,3,4'
  workflow_dispatch:   # 수동 실행 (테스트용)

jobs:
  send-japanese:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 일본어 폰트 설치
        run: |
          sudo apt-get install -y fonts-ipafont-gothic
          FONT=$(find /usr/share/fonts -name "ipag.ttf" -o -name "ipaexg.ttf" 2>/dev/null | head -1)
          echo "JAPANESE_FONT_PATH=$FONT" >> $GITHUB_ENV
          echo "Using font: $FONT"

      - name: 의존 라이브러리 설치
        run: pip install requests beautifulsoup4 fpdf2 python-dotenv lxml google-genai

      - name: 스크립트 실행
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python get_japanese.py
