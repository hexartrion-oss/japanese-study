name: 일본어 학습 예문 발송

on:
  schedule:
    # 월~금 오전 8시 KST = 일~목 23:00 UTC
    - cron: '0 23 * * 0,1,2,3,4'
  workflow_dispatch:   # 수동 실행 (테스트용)

jobs:
  send-japanese:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 일본어 폰트 설치
        run: |
          sudo apt-get install -y fonts-noto-cjk
          # 실제 설치된 폰트 경로 확인
          fc-list :lang=ja | head -5 || true
          find /usr/share/fonts -name "*CJK*" -o -name "*Noto*JP*" 2>/dev/null | head -10 || true

      - name: 폰트 경로 환경변수 설정
        run: |
          FONT=$(find /usr/share/fonts -name "NotoSansCJK-Regular.ttc" 2>/dev/null | head -1)
          if [ -z "$FONT" ]; then
            FONT=$(find /usr/share/fonts -name "*CJK*Regular*.ttc" -o -name "*CJK*Regular*.otf" 2>/dev/null | head -1)
          fi
          if [ -z "$FONT" ]; then
            # fallback: 직접 다운로드
            wget -q -O /tmp/NotoSansJP.otf \
              "https://github.com/notofonts/noto-cjk/raw/main/Sans/OTF/Japanese/NotoSansCJKjp-Regular.otf"
            FONT="/tmp/NotoSansJP.otf"
          fi
          echo "JAPANESE_FONT_PATH=$FONT" >> $GITHUB_ENV
          echo "Using font: $FONT"

      - name: 의존 라이브러리 설치
        run: pip install requests beautifulsoup4 fpdf2 python-dotenv lxml

      - name: 스크립트 실행
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python get_japanese.py
